# Lima VM — Almacenes beta local
# Requisitos: Lima 0.14+, macOS 13+ (Ventura o superior)
# Si falla con vmType: vz, cambiar a vmType: qemu
vmType: vz
memory: "4GiB"
cpus: 2
disk: "30GiB"

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"

portForwards:
  - guestPort: 80
    hostPort: 10080
  - guestPort: 443
    hostPort: 10443
