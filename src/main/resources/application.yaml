spring:
  application:
    name: almacenes
  datasource:
    url: jdbc:postgresql://localhost:5432/almacen_db
    username: postgres
    # PRODUCCIÓN: establecer la variable de entorno DB_PASSWORD antes de iniciar la aplicación.
    # Desarrollo local: el valor por defecto permite levantar sin configuración adicional.
    password: ${DB_PASSWORD:david123}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # 'validate' garantiza que Spring Boot respete tu script SQL sin borrar ni alterar tus tablas
      ddl-auto: validate
    show-sql: true
    properties:
      "[hibernate.format_sql]": true

server:
  port: 8080

jwt:
  # PRODUCCIÓN: establecer la variable de entorno JWT_SECRET con una clave de al menos
  # 256 bits (64 caracteres hex). Nunca usar el valor por defecto fuera del entorno local.
  # Ejemplo: export JWT_SECRET=$(openssl rand -hex 32)
  secret: ${JWT_SECRET:4a8f3b2e9c1d7f6a0b5e2c8d4f1a9b3e7c0d6f2a5b8e3c1d9f4a7b0e2c6d8f1}

cors:
  # Lista separada por comas de orígenes permitidos para peticiones cross-origin con
  # credenciales (JWT en header Authorization). NUNCA usar "*" combinado con credentials.
  # PRODUCCIÓN: establecer CORS_ALLOWED_ORIGINS con el(los) dominio(s) real(es) del frontend.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true